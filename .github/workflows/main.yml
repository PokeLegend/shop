<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fed Jumper · Portal · Bio · Offers</title>
    <style>
        /* ===== RESET & THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(-45deg, #0b0b1a, #1a103d, #0d1b2a, #0f0f1a);
            background-size: 400% 400%;
            animation: gradientShift 20s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== PARTICLE CANVAS ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== CONTAINER with glow ===== */
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 36px;
            padding: 32px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(108, 92, 231, 0.15) inset;
            margin-top: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.3), 0 0 80px rgba(108, 92, 231, 0.15), 0 40px 80px rgba(0, 0, 0, 0.7);
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            margin: 0 auto 14px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            user-select: none;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.35);
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%,
            100% {
                box-shadow: 0 8px 24px rgba(108, 92, 231, 0.35);
            }
            50% {
                box-shadow: 0 8px 40px rgba(108, 92, 231, 0.6);
            }
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 16px;
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 30px;
            font-size: 11px;
            color: #a78bfa;
            letter-spacing: 0.4px;
        }

        /* ===== TABS ===== */
        .tab-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.25s ease;
            letter-spacing: 0.3px;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #fff;
            background: rgba(108, 92, 231, 0.25);
            box-shadow: 0 0 0 1px rgba(108, 92, 231, 0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.35s ease;
            text-align: left;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================ */
        /* TAB 1: PORTAL */
        /* ============================================================ */
        .portal-container {
            text-align: center;
        }

        .portal-container h3 {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: center;
        }

        .portal-container .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
        }

        .order-summary {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 28px;
            text-align: center;
        }

        .order-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            max-width: 300px;
            margin: 0 auto;
        }

        .order-summary .row:last-child {
            border-bottom: none;
        }

        .order-summary .row .label {
            color: rgba(255, 255, 255, 0.5);
        }
        .order-summary .row .value {
            color: #fff;
            font-weight: 600;
        }
        .order-summary .row.total {
            margin-top: 6px;
            font-size: 16px;
        }
        .order-summary .row.total .value {
            color: #a78bfa;
            font-size: 18px;
        }

        /* ===== PAYMENT PROCESSORS – all clickable ===== */
        .processors-section {
            margin-bottom: 28px;
            text-align: center;
        }

        .processors-section .section-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin: 18px 0 10px 0;
            display: block;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 16px;
        }

        .processors-section .section-label:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        .processor-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .processor-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.2s;
            cursor: pointer;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }

        .processor-chip:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(108, 92, 231, 0.5);
            color: #fff;
            transform: scale(1.04);
        }

        .processor-chip .emoji {
            font-size: 14px;
        }

        /* ===== HIGHLIGHTED CHIPS – 3x LARGER & EYE-CATCHING ===== */
        .processor-chip.highlight {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.25);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5), 0 0 60px rgba(108, 92, 231, 0.2);
            color: #fff;
            font-size: 20px;
            padding: 14px 28px;
            border-radius: 50px;
            gap: 10px;
            font-weight: 700;
            animation: highlightPulse 1.8s ease-in-out infinite;
            border-width: 2px;
            letter-spacing: 0.5px;
            transform: scale(1);
            transition: 0.3s ease;
        }

        .processor-chip.highlight .emoji {
            font-size: 26px;
        }

        @keyframes highlightPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(108, 92, 231, 0.5), 0 0 60px rgba(108, 92, 231, 0.2);
                transform: scale(1);
                border-color: #6c5ce7;
            }
            50% {
                box-shadow: 0 0 50px rgba(108, 92, 231, 0.8), 0 0 100px rgba(108, 92, 231, 0.4), 0 0 150px rgba(108, 92, 231, 0.15);
                transform: scale(1.04);
                border-color: #a855f7;
            }
        }

        .processor-chip.highlight:hover {
            transform: scale(1.08);
            background: rgba(108, 92, 231, 0.4);
            box-shadow: 0 0 60px rgba(108, 92, 231, 0.8), 0 0 120px rgba(108, 92, 231, 0.4);
        }

        /* ===== SIMPLIFIED PAYMENT BUTTON ===== */
        .pay-simple-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.25);
            margin-top: 10px;
            text-align: center;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .pay-simple-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
            box-shadow: 0 8px 32px rgba(108, 92, 231, 0.4);
        }

        .secure-badge {
            text-align: center;
            margin-top: 14px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* ============================================================ */
        /* TAB 2: BIO (unchanged) */
        /* ============================================================ */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            color: #fff;
            text-decoration: none;
            transition: 0.25s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            gap: 12px;
            text-align: left;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(108, 92, 231, 0.4);
            transform: scale(1.01);
        }

        .link-btn .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .link-btn .icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
        }

        .link-btn .label {
            flex: 1;
        }

        .link-btn .right-arrow {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            transition: 0.2s;
        }

        .link-btn:hover .right-arrow {
            color: rgba(255, 255, 255, 0.6);
            transform: translateX(4px);
        }

        .link-btn.highlight {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.25), rgba(168, 85, 247, 0.15));
            border-color: rgba(108, 92, 231, 0.4);
            font-weight: 600;
        }

        .link-btn.highlight:hover {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.35), rgba(168, 85, 247, 0.25));
            border-color: #6c5ce7;
        }

        .link-btn .tag {
            font-size: 10px;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-left: 6px;
        }

        .link-btn .tag.pro {
            background: rgba(108, 92, 231, 0.25);
            color: #a78bfa;
        }

        .bio-email-section {
            margin: 12px 0 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
        }

        .bio-email-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .bio-email-box {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            max-width: 400px;
            margin: 0 auto;
        }

        .bio-email-box input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }

        .bio-email-box input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .bio-email-box button {
            padding: 10px 18px;
            border: none;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .bio-email-box button:hover {
            opacity: 0.8;
        }

        .bio-email-feedback {
            font-size: 12px;
            margin-top: 6px;
            min-height: 18px;
            color: #34d399;
        }

        /* ============================================================ */
        /* TAB 3: OFFERS */
        /* ============================================================ */
        .section-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin: 32px 0 18px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .section-title .lock {
            font-size: 13px;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .pricing-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pricing-card h5 {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }

        .pricing-card .price {
            color: #a78bfa;
            font-size: 20px;
            font-weight: 700;
            margin: 6px 0;
        }

        .pricing-card .price span {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
        }

        .pricing-card .btn-outline {
            background: transparent;
            border: 1px solid rgba(108, 92, 231, 0.4);
            color: #c4b5fd;
            padding: 4px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.2s;
        }

        .pricing-card .btn-outline:hover {
            background: rgba(108, 92, 231, 0.2);
        }

        .pricing-card.featured {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.08);
        }

        .form-wrapper {
            width: 100%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .form-wrapper iframe {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
            background: transparent;
        }

        .join-list-text {
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 0.3px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 550px) {
            .container {
                padding: 24px 16px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 6px 10px;
            }
            .link-btn {
                padding: 14px 16px;
                font-size: 14px;
            }
            .processor-chip {
                font-size: 11px;
                padding: 4px 10px;
            }
            .processor-chip.highlight {
                font-size: 16px;
                padding: 10px 20px;
            }
            .processor-chip.highlight .emoji {
                font-size: 20px;
            }
            .form-wrapper iframe {
                height: 700px;
            }
        }

        @media (max-width: 420px) {
            .tab-nav {
                gap: 2px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 6px 4px;
                min-width: 60px;
            }
            .processor-chip.highlight {
                font-size: 14px;
                padding: 8px 16px;
            }
            .processor-chip.highlight .emoji {
                font-size: 18px;
            }
            .form-wrapper iframe {
                height: 600px;
            }
        }
    </style>
</head>
