    <script>
        // ============================================================
        // PARTICLE ANIMATION
        // ============================================================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        let particles = [];

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.color = `rgba(168, 85, 247, ${this.opacity})`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles(count = 120) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(168, 85, 247, ${0.08 * (1 - dist/120)})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============================================================
        // TAB SWITCHING
        // ============================================================
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                tabButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                tabContents.forEach(c => c.classList.remove('active'));
                const target = this.dataset.tab;
                document.getElementById(`tab-${target}`).classList.add('active');
            });
        });

        // ============================================================
        // BIO TAB – navigation links (external)
        // ============================================================
        document.getElementById('bioPortalBtn')?.addEventListener('click', function() {
            window.open('https://whop.com/viraldancandotrends', '_blank');
        });

        document.getElementById('bioOffersBtn')?.addEventListener('click', function() {
            window.open('https://www.fedpromptly.com', '_blank');
        });

        document.querySelectorAll('.link-btn:not(#bioPortalBtn):not(#bioOffersBtn)').forEach(btn => {
            btn.addEventListener('click', function() {
                const label = this.dataset.bioLabel || this.querySelector('.label')?.textContent || 'Link';
                let url = '#';
                if (label.includes('Animated Links')) {
                    url = 'https://www.fedpromptly.com';
                } else if (label.includes('Digital Shop')) {
                    url = 'https://link.me/dancaplanet/shop';
                } else if (label.includes('Exclusive Content')) {
                    url = 'https://www.patreon.com/c/Viraldancandofunk/membership';
                } else {
                    url = 'https://link.me/dancaplanet';
                }
                window.open(url, '_blank');
            });
        });

        // ============================================================
        // BIO EMAIL (unchanged)
        // ============================================================
        function subscribeBioEmail() {
            const input = document.getElementById('bioEmailInput');
            const feedback = document.getElementById('bioEmailFeedback');
            const email = input.value.trim();
            if (!email) {
                feedback.textContent = '⚠️ Please enter an email.';
                feedback.style.color = '#f87171';
                return;
            }
            console.log('📧 New subscriber (bio):', email);
            feedback.textContent = '✅ You\'re on my list! (check console)';
            feedback.style.color = '#34d399';
            input.value = '';
            setTimeout(() => { feedback.textContent = ''; }, 4000);
        }

        document.getElementById('bioEmailSubscribeBtn')?.addEventListener('click', subscribeBioEmail);
        document.getElementById('bioEmailInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                subscribeBioEmail();
            }
        });

